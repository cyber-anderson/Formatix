name: Build EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: # ЭТА СТРОКА ДОБАВИТ КНОПКУ "RUN WORKFLOW"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pyinstaller pillow tkinterdnd2

      - name: Build with PyInstaller
        run: |
          pyinstaller --noconsole --onefile --icon=icon.ico --add-data "icon.ico;." --collect-all tkinterdnd2 formatix.py

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/formatix.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
